name: garm
base: bare
build-base: ubuntu@24.04
version: "0.1"
summary: GARM — GitHub Actions Runner Manager
description: |
  ROCK image containing the GARM binary and the OpenStack provider binary.
platforms:
  amd64:

parts:
  garm:
    plugin: go
    source: https://github.com/cloudbase/garm
    source-type: git
    # 2026/06/08: Pin to commit with PostgreSQL backend (PR #755, merged post-v0.2.1).
    # Switch to source-tag once v0.2.2+ is released.
    source-commit: 47811d0046a9515085b85d88038f87ac68fd793c
    source-depth: 1
    build-snaps:
      - go/1.26/stable
    build-environment:
      - GOTOOLCHAIN: local
    override-build: |
      cd "$CRAFT_PART_SRC"
      VERSION=$(git describe --tags --match='v[0-9]*' --always)
      go build -tags osusergo,netgo,sqlite_omit_load_extension \
        -ldflags "-extldflags -static -X github.com/cloudbase/garm/util/appdefaults.Version=${VERSION}" \
        -o bin/garm ./cmd/garm
      mkdir -p "$CRAFT_PART_INSTALL/usr/local/bin"
      cp bin/garm "$CRAFT_PART_INSTALL/usr/local/bin/"

  garm-provider-openstack:
    plugin: go
    source: https://github.com/cloudbase/garm-provider-openstack
    source-type: git
    # renovate: datasource=github-releases depName=cloudbase/garm-provider-openstack
    source-tag: v0.1.5
    build-snaps:
      - go/1.26/stable
    build-environment:
      - GOTOOLCHAIN: local
      # Force a fully static, pure-Go binary. The bare base ships no dynamic
      # loader or libc, so a cgo/dynamically-linked binary fails at fork/exec
      # with "no such file or directory" (missing ELF interpreter). CGO_ENABLED=0
      # selects the pure-Go net/os resolvers, mirroring the garm part's
      # osusergo,netgo,-static build.
      - CGO_ENABLED: "0"
    override-build: |
      cd "$CRAFT_PART_SRC"
      go build -o bin/garm-provider-openstack .
      mkdir -p "$CRAFT_PART_INSTALL/usr/local/bin"
      cp bin/garm-provider-openstack "$CRAFT_PART_INSTALL/usr/local/bin/"

  # Bare rocks ship no CA trust store, so GARM's static Go binary trusts no
  # root CAs. This chisel slice provides the pre-generated
  # /etc/ssl/certs/ca-certificates.crt bundle so TLS verification works,
  # mirroring the go-framework extension's runtime part.
  runtime:
    plugin: nil
    stage-packages:
      - ca-certificates_data

  pebble-layer:
    plugin: nil
    override-build: |
      mkdir -p "$CRAFT_PART_INSTALL/var/lib/pebble/default/layers"
      cat > "$CRAFT_PART_INSTALL/var/lib/pebble/default/layers/001-garm.yaml" << 'EOF'
      summary: GARM service
      services:
        go:
          override: replace
          summary: GARM GitHub Actions Runner Manager
          startup: disabled
          command: /usr/local/bin/garm
      EOF
