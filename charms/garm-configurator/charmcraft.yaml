# This file configures Charmcraft.
# See https://juju.is/docs/sdk/charmcraft-config for guidance.

name: garm-configurator

type: charm

base: ubuntu@24.04
platforms:
  amd64:

summary: Configuration broker charm for GARM scalesets.

description: |
  Holds configuration for a single GARM scaleset and provider combination,
  sharing it with the GARM charm via Juju integrations.

config:
  options:
    openstack-auth-url:
      type: string
      description: |
        OpenStack Keystone authentication URL.
    openstack-username:
      type: string
      description: |
        OpenStack username for authentication.
    openstack-password:
      type: secret
      description: |
        Juju secret containing the OpenStack password for authentication.
        The secret content must have a "value" key with the password string.
    openstack-project-name:
      type: string
      description: |
        OpenStack project (tenant) name.
    openstack-user-domain-name:
      type: string
      description: |
        OpenStack user domain name.
    openstack-project-domain-name:
      type: string
      description: |
        OpenStack project domain name.
    openstack-region-name:
      type: string
      description: |
        OpenStack region name.
    openstack-network:
      type: string
      description: |
        OpenStack network name or ID to use for instances.
    github-app-client-id:
      type: string
      description: |
        GitHub App client ID.
    github-app-installation-id:
      type: string
      description: |
        GitHub App installation ID.
    github-app-private-key:
      type: secret
      description: |
        Juju secret containing the GitHub App private key (PEM format).
        The secret content must have a "value" key with the private key string.
    name:
      type: string
      description: |
        The name of the scaleset.
    flavor:
      type: string
      description: |
        The resource flavor to use for runners in the scaleset.
    os-arch:
      type: string
      description: |
        The CPU architecture for runners in the scaleset.
    min-idle-runner:
      type: int
      default: 0
      description: |
        Minimum number of idle runners in the scaleset.
    max-runner:
      type: int
      default: 0
      description: |
        Maximum number of runners in the scaleset.
    labels:
      type: string
      description: |
        Comma-separated list of labels to add to runners.
    repo:
      type: string
      description: |
        Repository to register runners to. Mutually exclusive with org.
    org:
      type: string
      description: |
        Organization to register runners to. Mutually exclusive with repo.
    runner-group:
      type: string
      default: default
      description: |
        Runner group for org registration. Ignored when repo is set.
    pre-install-scripts:
      type: string
      description: |
        A Python dict-like string containing key-value pairs of script name
        to bash script to be run prior to runner installation.
    dockerhub-mirror:
      type: string
      description: |
        Optional Docker registry mirror URL for runners. Must be a valid http(s) address.
    runner-http-proxy:
      type: string
      description: |
        HTTP proxy that aproxy forwards to. Must be a valid http(s) URL.
    aproxy-exclude-addresses:
      type: string
      description: |
        Comma-separated IPv4 addresses/CIDRs to exclude from aproxy forwarding.
    aproxy-redirect-ports:
      type: string
      description: |
        Comma-separated ports or port ranges (e.g. 80,443,8000-9000) to forward to aproxy.
    otel-collector-endpoint:
      type: string
      description: |
        The OTEL exporter address for the otel-collector to connect to. Must be a valid http(s) URL.
    pre-job-script:
      type: string
      description: |
        A bash script appended to the end of the runner pre-job script.

provides:
  garm-configurator:
    interface: garm_configurator_v0

requires:
  image:
    interface: github_runner_image_v0
    limit: 1
    optional: false

parts:
  charm:
    source: .
    plugin: charm
