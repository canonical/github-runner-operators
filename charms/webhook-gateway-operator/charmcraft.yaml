name: github-runner-webhook-gateway

type: charm

base: ubuntu@24.04

platforms:
  amd64:

summary: Receive and forward GitHub webhooks to a MQ
links:
  documentation: https://canonical.com/juju/docs/github-runner-charms/

description: |
  This charm charms an application provides a WebService that receives GitHub webhooks and forwards
  them to an AMQP-0.9-1 compatible message broker.

extensions:
  - go-framework

config:
  options:
    github-app-id:
      type: int
      optional: true
      description: >-
        The ID of the GitHub App to use for communication with GitHub.
        If provided, the other github-app-* options must also be provided.
        The GitHub App needs to have write permission for Webhooks.
        This option is required with the other github-app-* options.
    github-app-installation-id:
      type: int
      optional: true
      description: >-
        The app installation ID of the GitHub App to use for communication with GitHub.
        If provided, the other github-app-* options must also be provided.
        The GitHub App needs to have write permission for Webhooks.
        This option is required with the other github-app-* options.
    github-app-private-key:
      type: secret
      optional: true
      description: >-
        The juju secret id of the private key to use for communication with GitHub.
        If provided, the other github-app-* options must also be provided.
        The GitHub App needs to have write permission for Webhooks.
        This option is required with the other github-app-* options.
    github-path:
      type: string
      optional: true
      description: |
        The path of the organisation or repository where the webhooks are registered. 
        Format: <organisation> or <organisation>/<repository>.
    redelivery-interval:
      type: int
      optional: true
      default: 600
      description: "Interval in seconds between redelivery checks. Defaults to 600 (10 minutes)."
    webhook-id:
      type: int
      optional: true
      description: "The ID of the webhook for which delivery attempts are being checked."
    webhook-secret:
      type: secret
      optional: false
      description: "The secret used to validate the webhook"

requires:
   rabbitmq:
     interface: rabbitmq
     optional: false
     limit: 1
   tracing:
     interface: tracing
     optional: true
     limit: 1
