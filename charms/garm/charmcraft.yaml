name: garm

type: charm

base: ubuntu@24.04

platforms:
  amd64:

summary: GARM — GitHub Actions Runner Manager charm.
links:
  documentation: https://canonical.com/juju/docs/github-runner-charms/

description: |
  Deploys and manages GARM (GitHub Actions Runner Manager) using the
  12-factor app framework with PostgreSQL storage and an OpenStack runner provider.

  GARM serves its API and Prometheus metrics on a single fixed port (8080), and
  its scrape target is declared in paas-config.yaml; the framework's app-port,
  metrics-port and metrics-path options are not used.

extensions:
  - go-framework

requires:
  postgresql:
    interface: postgresql_client
    optional: false
    limit: 1
  garm-configurator:
    interface: garm_configurator_v0
  debug-ssh:
    interface: debug-ssh
    limit: 1

actions:
  get-credentials:
    description: Show the GARM admin credentials.

config:
  options:
    use-runner-proxy-for-tmate:
      type: boolean
      default: false
      description: >
        Tunnel tmate (action-tmate debugging) traffic through the runner HTTP
        proxy instead of connecting to the tmate server directly. Enable this on
        deployments where the tmate server is not directly routable from the
        runner network (for example, a cross-tenant OpenStack runner tenant that
        can only reach the tmate server via the configured runner proxy). When
        enabled, the runner's tmate client is pointed at a local socat relay
        (127.0.0.1:3129) that forwards to the tmate server over the proxy via an
        HTTP CONNECT tunnel. Requires a runner HTTP proxy to be configured via
        the garm-configurator relation; otherwise it has no effect.
