project: github-runner-operators
path: /home/ubuntu/proj
kill-timeout: 60m
warn-timeout: 1m
backends:
  integration-test:
    type: integration-test
    systems:
      - ubuntu-24.04:
          runner: [self-hosted-linux-amd64-noble-edge]
          cpu: 4
          memory: 8
          disk: 20
environment:
  CONCIERGE: '$(HOST: echo "${CONCIERGE:-concierge.yaml}")'
  OPCLI_GIT_REF: '$(HOST: echo "${OPCLI_GIT_REF:-main}")'
  TEST_GITHUB_APP_ID: '$(HOST: echo "${TEST_GITHUB_APP_ID:-}")'
  TEST_GITHUB_APP_INSTALLATION_ID: '$(HOST: echo "${TEST_GITHUB_APP_INSTALLATION_ID:-}")'
  TEST_GITHUB_APP_PRIVATE_KEY: '$(HOST: echo "${TEST_GITHUB_APP_PRIVATE_KEY:-}")'
  TEST_GITHUB_PATH: '$(HOST: echo "${TEST_GITHUB_PATH:-}")'
exclude:
- .git
- .tox
- .venv
- .*_cache
integration-suites:
  charms/tests/integration/:
    summary: charm integration tests
    working-dir: ./
    backends:
    - integration-test
    environment:
      TOX_ENV: charms-integration
    pytest-environment-template: |
      TEST_GITHUB_APP_ID={{ env.get("TEST_GITHUB_APP_ID", "") }}
      TEST_GITHUB_APP_INSTALLATION_ID={{ env.get("TEST_GITHUB_APP_INSTALLATION_ID", "") }}
      TEST_GITHUB_APP_PRIVATE_KEY={{ env.get("TEST_GITHUB_APP_PRIVATE_KEY", "") }}
      TEST_GITHUB_PATH={{ env.get("TEST_GITHUB_PATH", "") }}
