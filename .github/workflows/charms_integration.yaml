name: Charm Integration Tests

on:
  pull_request:

jobs:
  integration-test:
    uses: canonical/charm-ci/.github/workflows/integration-test.yml@main
    secrets: inherit
    permissions:
      contents: read
      packages: write
      actions: read
    with:
      working-directory: .
      test-secret-1-name: TEST_GITHUB_APP_ID
      test-secret-2-name: TEST_GITHUB_APP_INSTALLATION_ID
      test-secret-3-name: TEST_GITHUB_APP_PRIVATE_KEY
      test-secret-4-name: TEST_GITHUB_PATH

  required_status_checks:
    name: Required Integration Test Status Checks
    runs-on: ubuntu-latest
    needs:
      - integration-test
    if: always() && !cancelled()
    timeout-minutes: 5
    steps:
      - name: Check integration-test status
        run: |
          RESULT="${{ needs.integration-test.result }}"
          if [ "$RESULT" = "success" ] || [ "$RESULT" = "skipped" ]; then
            exit 0
          else
            echo "integration-test failed with status: $RESULT"
            exit 1
          fi
