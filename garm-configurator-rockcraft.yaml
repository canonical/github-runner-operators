name: garm-configurator
base: ubuntu@24.04
build-base: ubuntu@24.04
version: "0.1"
summary: Minimal OCI image for garm-configurator charm
description: |
  Minimal container image for the garm-configurator charm runtime.
  No application services are started; the container runs Pebble
  as its entrypoint to satisfy the Juju K8s sidecar requirement.
platforms:
  amd64:

parts:
  garm-configurator:
    plugin: nil
